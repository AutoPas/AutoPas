functor                          :  highway
vectorizationPattern             :  [1xVectorLength, 2xVectorLengthDiv2, VectorLengthDiv2x2, VectorLengthx1]
data-layout                      :  [SoA]
container                        :  [LinkedCells]
newton3                          :  [enabled]
cutoff                           :  4
verlet-rebuild-frequency         :  10
verlet-skin-radius-per-timestep  :  0.1
deltaT                           :  0.0
iterations                       :  1000
boundary-type                    :  [reflective,reflective,reflective]
globalForce                      :  [0,0,-12]
Objects:
  CubeGrid:
    0:
      particles-per-dimension    :  [30, 30, 30]
      particle-spacing           :  1
      bottomLeftCorner           :  [0, 0, 0]
      velocity                   :  [0, 0, 0]
      particle-type-id           :  0
      particle-epsilon           :  1
      particle-sigma             :  1
      particle-mass              :  1
vtk-write-frequency              :  2000
vtk-filename                     :  Cube_patterns_hwy
load-balancer                    :  none