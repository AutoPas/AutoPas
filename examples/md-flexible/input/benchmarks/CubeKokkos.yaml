container                        : [KokkosDirectSum]
traversal                        :  [ ds_kokkos_flat, ds_kokkos_teams, ds_kokkos_chunks ]
functor                          : Lennard-Jones (12-6) Kokkos
newton3                          : [disabled]
data-layout                      : [SoA]
container-layout                 : [SoA]
verlet-rebuild-frequency         : 20
verlet-skin-radius               : 0.2
selector-strategy                : Fastest-Absolute-Value
tuning-samples                   : 1
tuning-max-evidence              : 10
cutoff                           : 3
box-min                          : [0, 0, 0]
box-max                          : [100, 100, 100]
cell-size                        : [1]
deltaT                           : 0.0
iterations                       : 1000
boundary-type                    : [reflective, reflective, reflective]
globalForce                      : [0, 0, 0]
Sites:
  0 :
    epsilon                      : 1.
    sigma                        : 1.
    mass                         : 1.
Objects:
  CubeClosestPacked:
    0:
      box-length                 : [50, 50, 50]
      particle-spacing           : 1.5
      bottomLeftCorner           : [5, 5, 5]
      velocity                   : [0, 0, 0]
      particle-type-id           : 0
      particle-mass              : 1.
vtk-filename                     : benchmarkCubeKokkos
vtk-write-frequency              : 200
kokkos-team-size                 : [20]
kokkos-chunk-size                : [20]
no-end-config                    : true